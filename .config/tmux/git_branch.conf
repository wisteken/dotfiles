# vim:set ft=tmux:
%hidden MODULE_NAME="git_branch"

set -ogq "@catppuccin_${MODULE_NAME}_icon" " "
set -ogqF "@catppuccin_${MODULE_NAME}_color" "#{E:@thm_teal}"
set -ogq "@catppuccin_${MODULE_NAME}_text" " #(~/.config/tmux/scripts/git_branch.sh #{pane_current_path})"

source -F "#{d:current_file}/plugins/tmux/utils/status_module.conf"
