# 基本設定
## 256色端末を使用する
set -g default-terminal "tmux-256color"
set -g terminal-overrides ",xterm-256color:RGB"

## Escキーの遅延を解消
set -s escape-time 0
## status line を更新する間隔を1秒にする
set-option -g status-interval 1
## ウィンドウのインデックスを1から始める
set -g base-index 1
## パススルーを有効にする
set -g allow-passthrough on
## ウィンドウ番号を振り直す
set -g renumber-windows on

# キーの割り当て変更
## prefixキーの割り当て(Ctr+b)
set -g prefix C-b
## C-bのキーバインドを解除
unbind C-b
## prefix + -で水平分割
bind - split-window -v
## prefix + |で垂直分割
bind | split-window -h
## ペインの移動をvimのキーバインドで移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
## ペインのリサイズをvimのキーバインドでする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
## ペインを終了
bind q kill-pane
## ウィンドウ終了
bind Q kill-window

# Ghostty Cmd key bridging (user-keys)
## Ghosttyが送信するエスケープシーケンスをtmuxで認識し、Neovimに転送する
set -s user-keys[0] "\e[112;9~"   # Cmd+P
set -s user-keys[1] "\e[70;10~"   # Cmd+Shift+F
set -s user-keys[2] "\e[80;10~"   # Cmd+Shift+P
set -s user-keys[3] "\e[98;9~"    # Cmd+B
set -s user-keys[4] "\e[47;9~"    # Cmd+/
set -s user-keys[5] "\e[96;9~"    # Cmd+`
set -s user-keys[6] "\e[106;9~"   # Cmd+J
set -s user-keys[7] "\e[74;10~"   # Cmd+Shift+J
bind-key -n User0 send-keys "\e[112;9~"
bind-key -n User1 send-keys "\e[70;10~"
bind-key -n User2 send-keys "\e[80;10~"
bind-key -n User3 send-keys "\e[98;9~"
bind-key -n User4 send-keys "\e[47;9~"
bind-key -n User5 send-keys "\e[96;9~"
bind-key -n User6 send-keys "\e[106;9~"
bind-key -n User7 send-keys "\e[74;10~"

# プラグインマネージャー
set -g @plugin 'tmux-plugins/tpm'

# session永続化
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# マウス操作
set-option -g mouse on
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @emulate-scroll-for-no-mouse-alternate-buffer "on"

# copy
set -g @plugin 'tmux-plugins/tmux-yank'

# ペインボーダーを常時表示（アクティブ/非アクティブ同じ色）
set -g pane-border-lines heavy

# ステータスバー用プラグイン
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'

# テーマ (Catppuccin Frappe)
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor "frappe"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# battery/cpuモジュールのテキストを直接スクリプト呼び出しに上書き
set -g @catppuccin_battery_icon "#(~/.config/tmux/plugins/tmux-battery/scripts/battery_icon.sh) "
set -g @catppuccin_battery_text " #(~/.config/tmux/plugins/tmux-battery/scripts/battery_percentage.sh)"
set -g @catppuccin_cpu_text " #(~/.config/tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh)"

# 1. Catppuccin を先に読み込む
run '~/.config/tmux/plugins/tmux/catppuccin.tmux'
# git branchカスタムモジュールを読み込む
source -F '#{d:current_file}/git_branch.conf'

# 2. ステータスバーを設定
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{?client_prefix,#[bg=#{@thm_pink}#,fg=#{@thm_crust}],#[bg=#{@thm_green}#,fg=#{@thm_crust}]}  #[default] "
set -g status-right ""
set -ga status-right "#{E:@catppuccin_status_git_branch}"
set -ga status-right "#{E:@catppuccin_status_battery}"
set -ga status-right "#{E:@catppuccin_status_cpu}"
set -ga status-right "#{E:@catppuccin_status_date_time}"

# 3. tpmの初期化
run '~/.local/share/tmux/plugins/tpm/tpm'
